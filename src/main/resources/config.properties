# ============================================================
# FRAMEWORK CONFIGURATION
# Override any property via environment variable or system property
# e.g. -Denv=staging  or  ENV=staging mvn test
# ============================================================

# ---- Environment ----
env=dev
base.url=https://your-app.example.com

# ---- Jira Configuration ----
jira.base.url=https://your-company.atlassian.net
jira.api.token=${JIRA_API_TOKEN}
jira.user.email=${JIRA_USER_EMAIL}
jira.project.key=QA
jira.test.label=automated
# Comma-separated Jira issue keys to fetch and run
jira.issue.keys=

# ---- PostgreSQL Database ----
db.host=${DB_HOST}
db.port=5432
db.name=${DB_NAME}
db.user=${DB_USER}
db.password=${DB_PASSWORD}
db.pool.size=10
db.connection.timeout=30000

# ---- Data Lake (AWS) ----
aws.region=us-east-1
aws.access.key=${AWS_ACCESS_KEY_ID}
aws.secret.key=${AWS_SECRET_ACCESS_KEY}
aws.s3.bucket=${S3_BUCKET_NAME}
aws.athena.database=${ATHENA_DATABASE}
aws.athena.output.location=s3://your-athena-results/output/

# ---- Selenium / UI ----
browser=chrome
headless=false
browser.timeout=30
browser.implicit.wait=5
browser.window.maximize=true
screenshot.on.failure=true
screenshot.dir=target/screenshots

# ---- Healenium Auto-Healing ----
healenium.score.cap=0.5
healenium.recovery.tries=1
healenium.screenshot.healing=true
healenium.db.host=${DB_HOST}
healenium.db.port=5432
healenium.db.name=healenium
healenium.db.user=${DB_USER}
healenium.db.password=${DB_PASSWORD}

# ---- GitHub Copilot (Enterprise) ----
copilot.api.url=https://api.githubcopilot.com
copilot.api.token=${GITHUB_COPILOT_TOKEN}
copilot.model=gpt-4o
copilot.enabled=true

# ---- MCP Server ----
mcp.server.port=8765
mcp.server.enabled=true

# ---- Reporting ----
allure.results.dir=target/allure-results
report.title=Enterprise Test Automation Report
jira.update.on.result=true
